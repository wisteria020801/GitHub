name: Burst Detection

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  burst:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Download previous database
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: github-radar-db
          path: .
          if_no_artifact_found: ignore
          workflow: daily_scan.yml
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Create .env file
        env:
          TOKEN_GITHUB: ${{ secrets.TOKEN_GITHUB }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHATGROUP_ID: ${{ secrets.TELEGRAM_CHATGROUP_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          cat > .env << EOF
          TOKEN_GITHUB=${TOKEN_GITHUB}
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
          TELEGRAM_CHATGROUP_ID=${TELEGRAM_CHATGROUP_ID}
          GOOGLE_API_KEY=${GOOGLE_API_KEY}
          LLM_MODEL=gemini-2.5-flash
          DB_PATH=github_radar.db
          SCAN_INTERVAL=240
          MIN_SCORE_TO_NOTIFY=70
          DEBUG=False
          EOF
      
      - name: Run burst detection
        run: python main.py --burst
      
      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-radar-db
          path: github_radar.db
          retention-days: 30
